name: Check Dataset Freshness

# Weekly check — opens a GitHub Issue if any dataset is approaching or past its expected update date.

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch: # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run freshness check
        id: freshness
        run: npx tsx scripts/check-freshness.ts --json | tee freshness-report.txt

      - name: Parse results
        id: parse
        run: |
          STALE=$(jq '.summary.stale' data/freshness-report.json)
          EXPIRING=$(jq '.summary.expiring' data/freshness-report.json)
          CURRENT=$(jq '.summary.current' data/freshness-report.json)
          TOTAL=$(jq '.total' data/freshness-report.json)

          echo "stale=$STALE" >> $GITHUB_OUTPUT
          echo "expiring=$EXPIRING" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "has_issues=$( [ "$STALE" -gt 0 ] || [ "$EXPIRING" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Build issue body
        if: steps.parse.outputs.has_issues == 'true'
        id: body
        run: |
          BODY="## Dataset Freshness Alert\n\n"
          BODY+="| Status | Count |\n|--------|-------|\n"
          BODY+="| ✅ Current | ${{ steps.parse.outputs.current }} |\n"
          BODY+="| ⚠️ Expiring | ${{ steps.parse.outputs.expiring }} |\n"
          BODY+="| ❌ Stale | ${{ steps.parse.outputs.stale }} |\n"
          BODY+="| **Total** | **${{ steps.parse.outputs.total }}** |\n\n"

          # List problematic datasets
          BODY+="### Datasets needing attention\n\n"
          BODY+=$(jq -r '.datasets[] | select(.status == "stale" or .status == "expiring") | "- **\(.name)** — \(.status) (last updated: \(.lastUpdated), \(.ageDays)d ago)"' data/freshness-report.json)

          BODY+="\n\n---\n*Generated by the weekly freshness check workflow.*"

          # Write to file to avoid quoting issues
          echo -e "$BODY" > issue-body.md

      - name: Create or update issue
        if: steps.parse.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('issue-body.md', 'utf8');
            const today = new Date().toISOString().split('T')[0];
            const stale = ${{ steps.parse.outputs.stale }};
            const expiring = ${{ steps.parse.outputs.expiring }};

            // Check if an open freshness issue already exists
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'data-freshness',
              per_page: 1,
            });

            if (issues.length > 0) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body,
                title: `Dataset freshness alert — ${stale} stale, ${expiring} expiring (${today})`,
              });
              core.info(`Updated existing issue #${issues[0].number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Dataset freshness alert — ${stale} stale, ${expiring} expiring (${today})`,
                body: body,
                labels: ['data-freshness'],
              });
            }

      - name: Summary
        run: |
          echo "### Freshness Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat freshness-report.txt >> $GITHUB_STEP_SUMMARY
