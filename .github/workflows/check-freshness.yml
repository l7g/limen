name: Check Dataset Freshness

# Weekly check — opens a GitHub Issue if any dataset is approaching or past its expected update date.

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch: # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Run freshness check
        id: freshness
        run: npx tsx scripts/check-freshness.ts | tee freshness-report.txt

      - name: Check for stale datasets
        id: stale
        run: |
          if grep -q "STALE\|EXPIRING" freshness-report.txt; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
          fi

      - name: Create issue if datasets are stale
        if: steps.stale.outputs.has_issues == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('freshness-report.txt', 'utf8');
            const today = new Date().toISOString().split('T')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Dataset freshness alert — ${today}`,
              body: `## Dataset Freshness Report\n\n\`\`\`\n${report}\n\`\`\`\n\nGenerated by the weekly freshness check workflow.`,
              labels: ['data-freshness']
            });
